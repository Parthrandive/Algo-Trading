name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: true

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel
          POSTGRES_DB: sentinel_db
        options: >-
          --health-cmd "pg_isready -U sentinel -d sentinel_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sentinel:sentinel@localhost:5432/sentinel_db

    steps:
    - uses: actions/checkout@v3
    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        docker rmi $(docker images -q) || true
        df -h
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Wait for Postgres
      run: |
        python - <<'PY'
        import os
        import time
        import psycopg2

        dsn = os.environ["DATABASE_URL"]
        deadline = time.time() + 90
        last_error = None

        while time.time() < deadline:
            try:
                with psycopg2.connect(dsn):
                    print("Postgres is ready")
                    raise SystemExit(0)
            except Exception as exc:
                last_error = exc
                time.sleep(2)

        print(f"Postgres did not become ready in time: {last_error}")
        raise SystemExit(1)
        PY
    - name: Initialize database schema
      run: |
        PYTHONPATH=. python -c "from src.db.init_db import init_database; init_database()"
    - name: Lint with Ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --target-version=py312
        # exit-zero treats all errors as warnings.
        ruff check . --exit-zero --target-version=py312
    - name: Run tests with pytest
      run: |
        PYTHONPATH=. pytest
